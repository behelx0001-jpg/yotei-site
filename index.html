<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yotei Нерухомість</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg = window.Telegram.WebApp;
    
    function sendFindRequest() {
        let filterData = {
            action: 'find_properties',
            price_min: document.getElementById('price_min').value,
            format: document.getElementById('format').value
        };
        tg.sendData(JSON.stringify(filterData));
    }
</script>

<div class="container">
    <h1>Пошук нерухомості</h1>

    <div class="filter-box">

        <div class="filter-group">
            <label>Тип операції</label>
            <select>
                <option>Купити</option>
                <option>Орендувати</option>
                <option>Продати</option>
                <option>Здати в оренду</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Тип нерухомості</label>
            <select>
                <option>Квартира</option>
                <option>Будинок</option>
                <option>Комерційна</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Місто</label>
            <input type="text" placeholder="Введіть місто">
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <label>Ціна від ($)</label>
                <input type="number" placeholder="10000">
            </div>

            <div class="filter-group">
                <label>Ціна до ($)</label>
                <input type="number" placeholder="500000">
            </div>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <label>Кімнат від</label>
                <input type="number" placeholder="1">
            </div>

            <div class="filter-group">
                <label>Кімнат до</label>
                <input type="number" placeholder="5">
            </div>
        </div>

        <div class="filter-group">
            <label>Площа (м²)</label>
            <input type="number" placeholder="Від 30">
        </div>

        <button class="search-btn">Знайти</button>
    <div id="results"></div>

    <script src="script.js"></script>
</body>
</html>
